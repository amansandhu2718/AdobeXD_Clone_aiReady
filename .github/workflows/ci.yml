name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: amanXDtool/package-lock.json

      - name: Install
        working-directory: amanXDtool
        run: npm install

      - name: Lint
        run: npm run lint:tool

      - name: Verify tool docs
        working-directory: amanXDtool
        run: npm run tools:verify-docs

      - name: Unit tests
        working-directory: amanXDtool
        run: npm run test

      - name: Build
        run: npm run build:github
